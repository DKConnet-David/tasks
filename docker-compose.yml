services:
  api:
    build: ./server
    env_file: .env
    environment:
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - data:/data
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: ./web
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - api

volumes:
  data: {}
