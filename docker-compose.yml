services:
  api:
    build: ./server
    env_file: .env
    environment:
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - data:/data
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: ./web
    # Single public port — nginx in this container serves the PWA and
    # reverse-proxies /auth, /tasks, /admin, /health to the api service
    # over the internal Docker network. The api service is not exposed.
    ports:
      - "9090:80"
    restart: unless-stopped
    depends_on:
      - api

volumes:
  data: {}
