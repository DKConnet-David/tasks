services:
  api:
    build: ./server
    # Env vars come from Coolify's "Environment Variables" panel. Compose
    # only forwards variables that are explicitly declared here with the
    # ${VAR} substitution form — that's why each one is named explicitly
    # below. Defaults (after :- ) keep the api booting when an optional var
    # isn't set yet (e.g. WHATSAPP_GROUP_JID before onboarding).
    environment:
      DATA_DIR: /data
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      # Server-side date formatting (PDF report header, WhatsApp test message,
      # log timestamps, SQLite CURRENT_TIMESTAMP) follows this zone. Browser-
      # side date formatting in the PWA already uses the user's local zone.
      TZ: ${TZ:-Africa/Johannesburg}

      SPLYNX_BASE_URL: ${SPLYNX_BASE_URL}
      SPLYNX_API_KEY: ${SPLYNX_API_KEY:-}
      SPLYNX_API_SECRET: ${SPLYNX_API_SECRET:-}

      ADMIN_LOGIN: ${ADMIN_LOGIN}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}

      WHATSAPP_GROUP_JID: ${WHATSAPP_GROUP_JID:-}

      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-43200}

      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      AI_DEBUG_LOG: ${AI_DEBUG_LOG:-false}
    volumes:
      - data:/data
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: ./web
    # Internal-only now. The Caddy sidecar below terminates TLS on the
    # host's :9090 and reverse-proxies to web:80 over the internal Docker
    # network. nginx inside this container still serves the PWA and
    # reverse-proxies /api/* /health to the api service.
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      - api

  caddy:
    # Custom image: caddy:2-alpine + the rfc2136 DNS plugin (built via
    # xcaddy in caddy/Dockerfile). DNS-01 challenge is the only viable
    # ACME path here — port 80 is closed inbound and the public port is
    # 9090, not 443.
    build: ./caddy
    restart: unless-stopped
    environment:
      ACME_TSIG_KEYNAME: ${ACME_TSIG_KEYNAME}
      ACME_TSIG_SECRET:  ${ACME_TSIG_SECRET}
      ACME_DNS_SERVER:   ${ACME_DNS_SERVER}
      ACME_EMAIL:        ${ACME_EMAIL}
    ports:
      - "9090:9090"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  data: {}
  # Cert + ACME account state. Critical that this persists across
  # redeploys — losing it forces re-issuance from scratch and bumps
  # against Let's Encrypt's "50 certs per registered domain per week"
  # rate limit.
  caddy_data: {}
  caddy_config: {}
