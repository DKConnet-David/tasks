upstream api_upstream {
    # Resolved via Docker's internal DNS — service name from docker-compose.yml.
    server api:3000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API reverse-proxy. The browser hits the same origin as the PWA, so no
    # CORS, and session cookies (HttpOnly, SameSite=Lax) Just Work.
    #
    # IMPORTANT: only /api/* and /health are proxied. /admin, /tasks/:id,
    # /login etc. are FRONTEND routes owned by React Router — those must
    # fall through to the SPA index.html below.
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Photo uploads can take a while when there's a lot of them — extend
        # the read timeout so the connection survives the AI summary +
        # PDF + Splynx + WhatsApp pipeline that runs synchronously inside
        # POST /api/tasks/:id/submit.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # Up to 50 photos × ~10MB phone JPEG = ~500MB worst case. Matches the
        # Fastify bodyLimit on the api side.
        client_max_body_size 600m;
    }

    location = /health {
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
    }

    # Long cache for fingerprinted assets, no-cache for the entry HTML.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # The PWA is a SPA — fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
