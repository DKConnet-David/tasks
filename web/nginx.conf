server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The PWA is a SPA — fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for fingerprinted assets, no-cache for the entry HTML.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Coolify routes /auth, /tasks, /admin to the api container at the
    # reverse-proxy layer; nothing required here for the API path.

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
