upstream api_upstream {
    # Resolved via Docker's internal DNS — service name from docker-compose.yml.
    server api:3000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API reverse-proxy. The browser hits the same origin as the PWA, so no
    # CORS, and session cookies (HttpOnly, SameSite=Lax) Just Work.
    location ~ ^/(auth|tasks|admin|health)(/|$) {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        # Multipart photo uploads can be a few MB each — match server bodyLimit.
        client_max_body_size 60m;
    }

    # Long cache for fingerprinted assets, no-cache for the entry HTML.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # The PWA is a SPA — fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
